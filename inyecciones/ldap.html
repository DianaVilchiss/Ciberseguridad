<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Login Vulnerable</title>

    <style>
      body {
        font-family: Arial;
        background: #0f172a;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
      }

      .form-box {
        background: #1e293b;
        padding: 40px;
        border-radius: 10px;
        width: 300px;
        text-align: center;
        color: white;
      }

      .form-box h2 {
        margin-bottom: 20px;
      }

      input {
        width: 100%;
        padding: 10px;
        margin: 10px 0;
        border: none;
        border-radius: 5px;
      }

      button {
        width: 100%;
        padding: 10px;
        background: #3b82f6;
        border: none;
        border-radius: 5px;
        color: white;
        cursor: pointer;
      }

      button:hover {
        background: #2563eb;
      }

      .back {
        display: block;
        margin-top: 20px;
        color: #93c5fd;
        text-decoration: none;
      }
    </style>
  </head>

  <body>
    <div class="form-box">
      <h2>Login Vulnerable</h2>

      <form method="POST">
        <input type="text" name="usuario" placeholder="Usuario" />

        <input type="text" name="password" placeholder="Contraseña" />

        <button type="submit">Ingresar</button>
      </form>

      <a href="/" class="back">Volver</a>
    </div>
  </body>
</html>
